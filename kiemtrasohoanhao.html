<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kiểm tra số hoàn hảo</title>
</head>
<body>
    <script>
    function soHoanHao(n) {
    if (n <= 1) return false;
    
    let sum = 0;
    for (let i = 1; i <= n / 2; i++) {
        if (n % i === 0) {
            sum += i;
        }
    }
    if (sum === n)      
    return true;
}
let n = parseInt(prompt("Nhập một số:"));
if (soHoanHao(n)) {
    alert(`${n} là số hoàn hảo.`);
} else {
    alert(`${n} không phải là số hoàn hảo.`);
}

// console.log(soHoanHao(6)); 
// console.log(soHoanHao(9));
    </script>

</body>
</html>
